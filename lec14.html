        // promise chaining
        let cart =["laptop","mobile","earphones","adaptor"]
        function createorder(cart){
            console.log("Creating order.......")
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    if(cart.length>0){
                        resolve({
                            orderId:12345,
                            amount:500000
                        })
                    }else{
                        reject("cart is empty")
                    }
                },5000)
            })

        }

        function makepayment(order){
            console.log("Initializing Payment....")
            return new Promise((resolve,reject)=>{
                let network = true;
                setTimeout(()=>{
                    if(network===true){
                        resolve({
                            ...order,     // spread operator=...
                            paymentid:"PAY123"
                        })
                    }else{
                        reject("payment failed")
                    }
                },5000)
            })
        }

        function updateInventory(order){
            console.log("updating inventory...")
            return new Promise((resolve,reject)=>{
                let inventoryAvailable = true;
                setTimeout(() => {
                    if(inventoryAvailable){
                        resolve({
                            ...order,
                            inventoryStatus:true
                        })
                    }else{
                        reject("inventory not available")
                    }
                }, 5000);
            })
        }

        function orderstatus(order){
            console.log("Confirming order.....")
            return new Promise((resolve, reject) => {
                let message = true;
                setTimeout(() => {
                    if(message){
                        resolve({
                            ...order,
                            orderstatuskey:"confirmed"
                        })
                    }else{
                        reject("order cancelled")
                    }
                }, 5000);
            })

        }


        createorder(cart).then((order)=>{
            console.log("order created for:",order)
            return makepayment(order)
        }).then((order)=>{
            console.log("payment successfull",order)
            return updateInventory(order)
        }).then((order)=>{
            console.log("update inventory",order)
            return orderstatus(order)
        }).then((order)=>{
            console.log(order)
        }).catch(err=>console.log(err))
