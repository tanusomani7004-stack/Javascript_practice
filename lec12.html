<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>Stop Alarm</button>
    
    <script>

        let stopbtn = document.querySelector('button')
        let alarm = setTimeout(()=>{
            console.log("Alarm beeping...")
        },10000)  // clear time out set time out ko rok deta hn


        function stopalarmfunc(){
            clearTimeout(alarm)

        }
        stopbtn.addEventListener('click',stopalarmfunc)
    </script>
</body>
</html>
