<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callbackkkt</title>
</head>
<body>
    
    <script>
  // ik function dusre function ko call krega 

  let cart = ["laptop","mobile","earphones"];

  function createorder(card,callback){
    console.log("order created for :",cart )
    setTimeout(()=>{
        let orderid = 1234
        callback(orderid)
    },5000)
  }

  function makepayment(orderid,callback){
    console.log("Making payment for : order", orderid)
    setTimeout(()=>{
        let ui = 10-1;
        callback(ui)
    },3000)

  }
  function updateinventory(ui,callback){
    console.log("inventory updated:",ui);
    setTimeout(()=>{
        let message = "success"
        callback(message);
    })
  }

  function orderstatus(message){
    console.log("order status",message)
  }

  createorder(cart,function(orderid){
    makepayment(orderid,function(ui){
        updateinventory(ui,function(message){
            orderstatus(message)
        })
    })

  })
  // drawbacks of callback
  //1.callback hell (prement of doow) ,  2.difficulty in error handling   3.code become complex 4. inversion of  control (jab ik fun dusre fun pe depend hota h invok krne ke liye )
    </script>
</body>
</html>
