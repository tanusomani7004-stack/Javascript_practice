<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#7d2c72, #283a75);
    display: flex;
    justify-content: center;
    padding: 40px 0;
    color: white;
}

.main-wrapper {
    width: 900px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.top-section {
    display: flex;
    gap: 20px;
}

.card {
    background: #f3f3f3;
    color: black;
    padding: 20px;
    border-radius: 8px;
    flex: 1;
}

.search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

input {
    flex: 1;
    padding: 8px;
}

button {
    padding: 8px 15px;
    background: #ff7a2f;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 4px;
}

.history span {
    background: #ff7a2f;
    color: white;
    padding: 5px 10px;
    border-radius: 15px;
    margin-right: 5px;
    display: inline-block;
    margin-top: 5px;
    cursor: pointer;
}

.weather-info p {
    background: #e8e8e8;
    padding: 8px;
    border-radius: 4px;
    margin: 5px 0;
}

.console-card {
    margin-top: 20px;
    background: #f3f3f3;
    color: black;
    padding: 20px;
    border-radius: 8px;
}

.console-box{
    background: #1f2a5a;
    color: #00ffcc;
    padding: 15px;
    border-radius: 5px;
    min-height: 100px;
    font-family: monospace;
    font-size: 14px;
}
    </style>
</head>
<body>

<div class="main-wrapper">

    <h1>🌤 Async Weather Tracker</h1>

    <div class="top-section">

        <div class="card">
            <h3>Search City</h3>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name">
                <button id="searchBtn">Search</button>
            </div>

            <h4>Search History</h4>
            <div id="historyList" class="history"></div>
        </div>

        <div class="card">
            <h3>Weather Info</h3>
            <div id="weatherCard" class="weather-info">
                <p>City: -</p>
                <p>Temp: -</p>
                <p>Weather: -</p>
                <p>Humidity: -</p>
                <p>Wind: -</p>
            </div>
        </div>

    </div>

    <div class="console-card">
        <h3>Console – Event Loop</h3>
        <div id="consoleBox" class="console-box"></div>
    </div>

</div>

<script>
   const apiKey = "124087432efff6c66407368c447e2b14"; // yaha apni real key

const searchBtn = document.getElementById("searchBtn");
const cityInput = document.getElementById("cityInput");
const consoleBox = document.getElementById("consoleBox");
const weatherCard = document.getElementById("weatherCard");
const historyList = document.getElementById("historyList");

function logConsole(message) {
    const p = document.createElement("p");
    p.textContent = message;
    consoleBox.appendChild(p);
}

async function fetchWeather(city) {

    consoleBox.innerHTML = "";
    logConsole("Sync Start");

    try {

        logConsole("[Async] Fetching started...");

        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
        );

        const data = await response.json();

        if (data.cod !== 200) {
            throw new Error(data.message);
        }

        weatherCard.innerHTML = `
            <p><strong>City:</strong> ${data.name}, ${data.sys.country}</p>
            <p><strong>Temp:</strong> ${data.main.temp} °C</p>
            <p><strong>Weather:</strong> ${data.weather[0].description}</p>
            <p><strong>Humidity:</strong> ${data.main.humidity}%</p>
            <p><strong>Wind:</strong> ${data.wind.speed} m/s</p>
        `;

        logConsole("Promise.then (Microtask)");
        logConsole("setTimeout (Macrotask)");
        logConsole("[Async] Data received");

        saveToLocalStorage(city);

    } catch (error) {

        weatherCard.innerHTML =
            `<p style="color:red;">City not found</p>`;

        logConsole("Error: " + error.message);
    }

    logConsole("Sync End");
}

function saveToLocalStorage(city) {

    let cities = JSON.parse(localStorage.getItem("cities")) || [];

    if (!cities.includes(city)) {
        cities.push(city);
        localStorage.setItem("cities", JSON.stringify(cities));
    }

    displayHistory();
}

function displayHistory() {

    historyList.innerHTML = "";

    let cities = JSON.parse(localStorage.getItem("cities")) || [];

    cities.forEach(city => {
        const span = document.createElement("span");
        span.textContent = city;
        span.addEventListener("click", () => fetchWeather(city));
        historyList.appendChild(span);
    });
}

searchBtn.addEventListener("click", () => {

    const city = cityInput.value.trim();

    if (!city) {
        weatherCard.innerHTML =
            `<p style="color:red;">Please enter a city</p>`;
        return;
    }

    fetchWeather(city);
});

window.addEventListener("load", displayHistory);
</script>
</body>
</html>
